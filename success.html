<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
        linear-gradient(rgba(248,245,239,.45),rgba(239,229,212,.55)),
        url("intro.png") center center/cover no-repeat fixed;
    overflow:hidden;
}

/* Floating Hearts */
.heartFloat{
    position:fixed;
    top:-30px;
    color:#fff;
    font-size:14px;
    pointer-events:none;
    opacity:.8;
    animation:fall linear forwards;
    text-shadow:0 0 8px rgba(255,255,255,.8);
}

@keyframes fall{
    0%{
        transform:translateY(-20px);
        opacity:0;
    }
    15%{
        opacity:1;
    }
    100%{
        transform:translateY(110vh);
        opacity:0;
    }
}

.card{
    width:90%;
    max-width:430px;
    background:rgba(255,255,255,.92);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    padding:45px 30px;
    border-radius:28px;
    text-align:center;
    box-shadow:0 20px 45px rgba(0,0,0,.18);
}

.heart{
    font-size:52px;
    margin-bottom:15px;
}

h1{
    font-family:"Great Vibes",cursive;
    font-size:64px;
    color:#556b2f;
    margin-bottom:15px;
}

p{
    color:#555;
    font-size:18px;
    line-height:1.8;
}

.btn{
    display:inline-block;
    margin-top:30px;
    background:#556b2f;
    color:#fff;
    text-decoration:none;
    padding:14px 34px;
    border-radius:30px;
    font-weight:500;
    transition:.3s;
}

.btn:hover{
    background:#465b26;
    transform:translateY(-2px);
}

@media(max-width:600px){

    h1{
        font-size:52px;
    }

    p{
        font-size:16px;
    }

    .card{
        padding:35px 22px;
    }

}
</style>

</head>
<body>

<div class="card">

    <div class="heart">❤️</div>

    <h1>Thank You!</h1>

    <p>
        Your RSVP has been received successfully.
        <br><br>
        We look forward to celebrating our special day with you.
    </p>

    <a href="index.html" class="btn">Back to Invitation</a>

</div>

<script>
function heart(){
    const h=document.createElement("div");
    h.className="heartFloat";
    h.innerHTML="♡";
    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(10+Math.random()*12)+"px";
    h.style.animationDuration=(6+Math.random()*5)+"s";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),11000);
}

for(let i=0;i<20;i++){
    setTimeout(heart,i*200);
}

setInterval(heart,700);
</script>

</body>
</html>
