<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Poppins,sans-serif;
    background:#f7f4ed;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:90%;
    max-width:420px;
    background:white;
    padding:40px 30px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.15);
}

h1{
    font-family:"Great Vibes",cursive;
    font-size:58px;
    color:#556b2f;
    margin-bottom:10px;
}

.heart{
    font-size:48px;
    margin:15px 0;
}

p{
    font-size:18px;
    line-height:1.8;
    color:#555;
}

a{
    display:inline-block;
    margin-top:25px;
    background:#556b2f;
    color:white;
    padding:12px 28px;
    text-decoration:none;
    border-radius:30px;
}
</style>
</head>

<body>

<div class="card">
    <div class="heart">❤️</div>

    <h1>Thank You!</h1>

    <p>
        Your RSVP has been received successfully.
        <br><br>
        We look forward to celebrating our special day with you.
    </p>

    <a href="index.html">Back to Invitation</a>
</div>

</body>
</html>
