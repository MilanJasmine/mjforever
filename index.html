<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Milan & Jasmine Wedding</title>

<!--

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
    font-family:Poppins,sans-serif;
    background:#f7f4ed;
    margin:0;
    padding:40px;
}
.card{
    max-width:430px;
    margin:auto;
    background:#fff;
    padding:30px;
    border-radius:24px;
    box-shadow:0 15px 40px rgba(0,0,0,.15);
}
input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ccc;
    margin:15px 0;
}
button{
    background:#556b2f;
    color:#fff;
    border:none;
    padding:12px 24px;
    border-radius:25px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
<h2 style="text-align:center">RSVP</h2>

<input
id="guestName"
type="text"
placeholder="Enter your name">

<button onclick="submitRSVP()">I'm Attending</button>

<p id="status"></p>

</div>

<script>

const SCRIPT_URL="PASTE_YOUR_APPS_SCRIPT_WEB_APP_URL_HERE";

function submitRSVP(){

    const name=document.getElementById("guestName").value.trim();

    if(name===""){
        alert("Please enter your name.");
        return;
    }

    const formData=new FormData();
    formData.append("name",name);

    fetch(SCRIPT_URL,{
        method:"POST",
        body:formData
    })
    .then(r=>r.text())
    .then(()=>{
        document.getElementById("status").innerHTML=
        "❤️ Thank you for your RSVP!";
        document.getElementById("guestName").value="";
    })
    .catch(err=>{
        console.error(err);
        alert("Unable to submit RSVP.");
    });

}
</script>

</body>
</html>
